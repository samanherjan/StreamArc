name: StreamArc

options:
  bundleIdPrefix: com.samanherjan.streamarc
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Debug
  developmentTeam: K2H226BNXQ

packages:
  StreamArcCore:
    path: LocalPackages/StreamArcCore
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
  YouTubePlayerKit:
    url: https://github.com/SvenTiigi/YouTubePlayerKit
    from: "1.0.0"
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: targeted
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: K2H226BNXQ
    VALIDATE_EMBEDDED_BINARY_IDS: NO

targets:

  # ─── iOS / iPadOS ────────────────────────────────────────────────
  StreamArc:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StreamArc/App/iOS
      - path: StreamArc/App/Shared
      - path: StreamArc/Core
      - path: StreamArc/Features
      - path: StreamArc/Shared
      - path: StreamArc/Monetization
      - path: StreamArc/Ads
      - path: StreamArc/Resources
    dependencies:
      - package: StreamArcCore
      - package: Kingfisher
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: YouTubePlayerKit
      - package: KSPlayer
    settings:
      base:
        INFOPLIST_FILE: StreamArc/App/iOS/Info.plist
        DEVELOPMENT_ASSET_PATHS: '"StreamArc/Resources/Preview Content"'
        VALIDATE_EMBEDDED_BINARY_IDS: NO
    info:
      path: StreamArc/App/iOS/Info.plist
      properties:
        CFBundleDisplayName: StreamArc
        UILaunchScreen:
          UIColorName: ""
        GADApplicationIdentifier: "ca-app-pub-XXXXXXXXXXXXXXXX~XXXXXXXXXX"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSUserTrackingUsageDescription: "StreamArc uses this to show you relevant ads. Upgrade to StreamArc+ to remove all ads."
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: "cstr6suwn9.skadnetwork"
          - SKAdNetworkIdentifier: "4fzdc2evr5.skadnetwork"

  # ─── tvOS ────────────────────────────────────────────────────────
  StreamArc_tvOS:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: StreamArc/App/tvOS
      - path: StreamArc/App/Shared
      - path: StreamArc/Core
      - path: StreamArc/Features
      - path: StreamArc/Shared
      - path: StreamArc/Monetization
      - path: StreamArc/Ads
      - path: StreamArc/Resources
    dependencies:
      - package: StreamArcCore
      - package: Kingfisher
      - package: KSPlayer
    postBuildScripts:
      - script: |
          # Fix KSPlayer's libshaderc_combined framework bundle ID.
          # Change underscore to hyphen (valid bundle ID char) to match what's in the binary.
          FW_DIR="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/libshaderc_combined.framework"
          if [ -d "$FW_DIR" ]; then
            PLIST="$FW_DIR/Info.plist"
            if [ -f "$PLIST" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.kintan.ksplayer.libshaderc-combined" "$PLIST" 2>/dev/null || true
            fi
            codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY:-'-'}" --timestamp=none "$FW_DIR" 2>/dev/null || true
          fi
        name: Sign KSPlayer Framework
        basedOnDependencyAnalysis: false
    settings:
      base:
        INFOPLIST_FILE: StreamArc/App/tvOS/Info.plist
        DEVELOPMENT_ASSET_PATHS: '"StreamArc/Resources/Preview Content"'
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        VALIDATE_EMBEDDED_BINARY_IDS: NO
        VALIDATE_PRODUCT: NO
        OTHER_CODE_SIGN_FLAGS: "--deep"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: K2H226BNXQ
    info:
      path: StreamArc/App/tvOS/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

  # ─── macOS ───────────────────────────────────────────────────────
  StreamArc_macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: StreamArc/App/macOS
      - path: StreamArc/App/Shared
      - path: StreamArc/Core
      - path: StreamArc/Features
      - path: StreamArc/Shared
      - path: StreamArc/Monetization
      - path: StreamArc/Ads
      - path: StreamArc/Resources
    dependencies:
      - package: StreamArcCore
      - package: Kingfisher
      - package: YouTubePlayerKit
      - package: KSPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samanherjan.streamarc.macos
        INFOPLIST_FILE: StreamArc/App/macOS/Info.plist
        DEVELOPMENT_ASSET_PATHS: '"StreamArc/Resources/Preview Content"'
        VALIDATE_EMBEDDED_BINARY_IDS: NO
    info:
      path: StreamArc/App/macOS/Info.plist
      properties:
        CFBundleDisplayName: StreamArc
        GADApplicationIdentifier: "ca-app-pub-XXXXXXXXXXXXXXXX~XXXXXXXXXX"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSApplicationCategoryType: public.app-category.entertainment
        NSPrincipalClass: NSApplication

  # ─── Unit Tests ──────────────────────────────────────────────────
  StreamArcTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StreamArcTests
    dependencies:
      - target: StreamArc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samanherjan.streamarc.tests
        INFOPLIST_FILE: ""

schemes:
  StreamArc:
    build:
      targets:
        StreamArc: all
    run:
      config: Debug
      storeKitConfiguration: StreamArc.storekit
    test:
      config: Debug
      targets:
        - StreamArcTests

  StreamArc_tvOS:
    build:
      targets:
        StreamArc_tvOS: all
    run:
      config: Debug
      storeKitConfiguration: StreamArc.storekit

  StreamArc_macOS:
    build:
      targets:
        StreamArc_macOS: all
    run:
      config: Debug
      storeKitConfiguration: StreamArc.storekit
